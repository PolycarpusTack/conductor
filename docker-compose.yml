version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: conductor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conductor
      POSTGRES_USER: conductor
      POSTGRES_PASSWORD: conductor_dev
    ports:
      - '5432:5432'
    volumes:
      - conductor_pgdata:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U conductor -d conductor']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  conductor_pgdata:
